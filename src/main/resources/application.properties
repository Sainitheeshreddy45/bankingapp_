

# ===================================================================
# 1. APPLICATION CORE CONFIGURATION
# ==================================================================
spring.application.name=portal
server.port=8080

# ===================================================================
# 2. POSTGRESQL DATABASE CONNECTION POOL (HikariCP)
# ===================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres18
spring.datasource.username=sainitheeshreddy
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Performance & Optimization Tuning
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=2000000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.pool-name=MerchantHikariCP

# ===================================================================
# 3. JPA / HIBERNATE CONFIGURATION
# ===================================================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# "update" is fine for development; change to "validate" or use Flyway/Liquibase for production
#spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ===================================================================
# 4. SECURITY & FILE UPLOAD PLUMBING (Module 1 & 5)
# ===================================================================
# Multi-part file upload thresholds (Enforces Module 1: 5MB limit cap)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Turn off basic default spring security login popups
spring.security.user.password=

# ===================================================================
# 5. ACTUATOR & HEALTH MONITORING (Module 6 Verification)
# ===================================================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always