# ===================================================================
# 1. APPLICATION CORE CONFIGURATION
# ===================================================================
spring.application.name=portal
server.port=8080

# ===================================================================
# 2. POSTGRESQL DATABASE CONNECTION POOL (HikariCP)
# ===================================================================
# NOTE: When running inside Docker, Docker Compose automatically overrides
# this URL to 'jdbc:postgresql://postgres-db:5432/postgres18' via environment variables.
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres18
spring.datasource.username=sainitheeshreddy
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Performance & Optimization Tuning
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=2000000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.pool-name=MerchantHikariCP

# ===================================================================
# 3. JPA / HIBERNATE & AUTOMATED SQL SEEDING CONFIGURATION
# ===================================================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Force Spring Boot to execute script-based data initialization on startup
spring.sql.init.mode=always

# CRUCIAL: Defers data.sql execution until AFTER Hibernate has successfully
# inspected, created, or updated the entity tables to prevent constraint crashes.
spring.jpa.defer-datasource-initialization=true

# Quiet the default Open-In-View warning log
spring.jpa.open-in-view=false
# Tells Spring Boot to continue starting up even if a script fails
spring.sql.init.continue-on-error=true

# ===================================================================
# 4. SECURITY & FILE UPLOAD PLUMBING (Module 1 & 5)
# ===================================================================
# Multi-part file upload thresholds (Enforces Module 1: 5MB limit cap)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Turn off basic default spring security login popups
spring.security.user.password=

# ===================================================================
# 5. ACTUATOR & HEALTH MONITORING (Module 6 Verification)
# ===================================================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always